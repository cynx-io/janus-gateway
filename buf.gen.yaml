# File: buf.gen.yaml (in project root)

version: v2
managed:
  enabled: true
inputs:
  - directory: .
  - module: buf.build/cynx/cynx-core:v0.0.32
plugins:
  - local: protoc-gen-go
    out: api/proto/gen
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: api/proto/gen
    opt:
      - paths=source_relative
  - local: protoc-gen-validate
    out: api/proto/gen
    opt:
      - paths=source_relative
      - lang=go
  - local: protoc-gen-es
    out: gen/web
    opt:
      - target=ts
    strategy: directory
  - remote: buf.build/grpc/kotlin
    out: gen/kotlin
    opt:
      - grpcKotlinStubs=true
      - grpcDescriptors=true